<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <script type="text/javascript">
      document.write(
        '<link rel="stylesheet" href="css/main.css?' + Math.random() + '">'
      );
    </script>
    <link
      href="https://fonts.googleapis.com/css?family=Ubuntu|Ubuntu+Condensed|Ubuntu+Mono&display=swap"
      rel="stylesheet"
    />
    <title>Loading Screen</title>
  </head>
  <body>
    <div class="background"></div>
    <div class="overhaul"></div>

    <nav>
      <div id="announcement"></div>
      <span id="map">Ви граєте на </span>
      <span id="steamid"></span>
    </nav>

    <div id="debug"></div>

    <main>
      <div class="title">
        <h2>Ласково просимо до,</h2>
        <h1 id="title"></h1>
        <div id="history"></div>
      </div>
      <div class="under-nav"></div>
      <div class="loading-box"></div>
    </main>

    <!-- Музыка -->
    <audio id="bg-music" loop>
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <script src="js/lib/jquery-3.4.1.min.js"></script>
    <script type="text/javascript">
      document.write(
        '<script src="js/config.js?' + Math.random() + '"><\/script>'
      );
      document.write(
        '<script src="js/main.js?' + Math.random() + '"><\/script>'
      );

      // Музыка + плавное появление
      const audio = document.getElementById("bg-music");

      window.addEventListener("load", () => {
        audio.volume = 0;

        audio.play().then(() => {
          // Плавное увеличение громкости
          let vol = 0;
          const fade = setInterval(() => {
            if (vol < 0.2) {
              vol += 0.01;
              audio.volume = vol;
            } else {
              clearInterval(fade);
            }
          }, 100);
        }).catch(() => {
          // если автозапуск заблокирован
          document.addEventListener("click", () => {
            audio.play();

            let vol = 0;
            const fade = setInterval(() => {
              if (vol < 0.2) {
                vol += 0.01;
                audio.volume = vol;
              } else {
                clearInterval(fade);
              }
            }, 100);
          }, { once: true });
        });
      });
    </script>
  </body>
</html>
